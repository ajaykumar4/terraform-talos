configMaps:
  config:
    data:
      config.yaml: ENC[AES256_GCM,data:,iv:c3V7397BG0rQkwqfB7xVH2KpeyWgykrAsN1mhzqmQaY=,tag:X+55iJngGLtDdxS+EPs1Qg==,type:str]
controllers:
  cloudflare-tunnel:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        args:
          - tunnel
          - run
        env:
          NO_AUTOUPDATE: true
          TUNNEL_METRICS: 0.0.0.0:8080
          TUNNEL_POST_QUANTUM: true
          TUNNEL_TRANSPORT_PROTOCOL: quic
        envFrom:
          - secretRef:
              name: cloudflare-tunnel-secret
        image:
          repository: docker.io/cloudflare/cloudflared
          tag: 2026.3.0
        probes:
          liveness:
            custom: true
            enabled: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /ready
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
          readiness:
            custom: true
            enabled: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /ready
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 10m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
    strategy: RollingUpdate
defaultPodOptions:
  securityContext:
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
persistence:
  config-file:
    globalMounts:
      - path: /etc/cloudflared/config.yaml
        subPath: config.yaml
    identifier: config
    type: configMap
service:
  app:
    ports:
      http:
        port: 8080
serviceMonitor:
  app:
    enabled: false
