[env]
#-------------------------------------------------------------------------------
# CLUSTER ENVIRONMENT VARIABLES
#-------------------------------------------------------------------------------
# Automatically point CLI tools at the Terraform-generated configs
TALOSCONFIG = "infrastructure/secrets/talosconfig"
KUBECONFIG = "infrastructure/secrets/kubeconfig"

# SOPS/Age Identity
SOPS_AGE_KEY_FILE = "infrastructure/secrets/age.key"

[tools]
#-------------------------------------------------------------------------------
# CORE RUNTIMES (Managed via Aqua backend in mise)
#-------------------------------------------------------------------------------
# Installing OpenTofu via aqua to ensure version pinning
"aqua:opentofu/opentofu" = "1.11.5"

#-------------------------------------------------------------------------------
# CLI TOOLS (Using Aqua backend via mise)
#-------------------------------------------------------------------------------
# Talos OS Management
"aqua:siderolabs/talos" = "1.12.5"

# Kubernetes Operations
"aqua:kubernetes/kubectl"   = "1.32.2"
"aqua:helm/helm"            = "4.1.1"

# Secrets & Encryption
"aqua:getsops/sops" = "3.12.1"
"aqua:FiloSottile/age" = "1.3.1"

# GitOps & Networking
"aqua:argoproj/argo-cd"    = "3.3.3"
"aqua:cilium/cilium-cli"   = "0.19.2"

# Task Runner
"aqua:go-task/task" = "3.49.1"
